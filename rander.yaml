services:
  - type: web
    name: toko-bunga-laravel
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: apachectl -D FOREGROUND
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: toko-bunga-db
    plan: free
    databaseName: flowers_db
    user: admin_flower